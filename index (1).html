  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

px);letter-spacing:0.34em;text-transform:uppercase;color:var(--accent);margin-bottom:clamp(18px,2.2vw,28px);}\n  h1{font-weight:700;font-size:clamp(44px,7vw,104px);line-height:1.0;letter-spacing:-0.015em;}\n  .epigraph{font-family:var(--hand);font-size:clamp(27px,3.1vw,48px);font-weight:600;color:var(--accent);margin-top:clamp(18px,2.2vw,32px);line-height:1.12;}\n\n  /* ---------- COURSE INFORMATION TABLE ---------- */\n  .info{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--line);}\n  @media(max-width:820px){.info{grid-template-columns:1fr 1fr;}}\n  @media(max-width:520px){.info{grid-template-columns:1fr;}}\n  .info .cell{padding:17px clamp(14px,1.6vw,26px);border-top:1px solid var(--line);border-right:1px solid var(--line);}\n  .info .cell:nth-child(3n){border-right:0;}\n  @media(max-width:820px){.info .cell:nth-child(3n){border-right:1px solid var(--line);}.info .cell:nth-child(2n){border-right:0;}}\n  @media(max-width:520px){.info .cell{border-right:0!important;}}\n  .info .k{font-size:clamp(11.5px,0.9vw,13.5px);letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);}\n  .info .v{font-size:clamp(18px,1.45vw,25px);margin-top:6px;color:var(--ink);line-height:1.4;}\n  .info .v b{font-weight:700;color:var(--accent);}\n\n  /* ---------- DOCUMENT SECTIONS (marginalia layout) ---------- */\n  section{display:grid;grid-template-columns:minmax(170px,225px) minmax(0,1fr);gap:clamp(22px,3.5vw,66px);\n    padding:clamp(36px,4.3vw,60px) 0;border-bottom:1px solid var(--line);}\n  @media(max-width:840px){section{grid-template-columns:1fr;gap:14px;padding:34px 0;}}\n\n  .marg{position:relative;display:grid;grid-template-columns:auto 1fr;column-gap:14px;align-items:baseline;}\n  @media(min-width:841px){.marg{position:sticky;top:28px;align-self:start;}}\n  .marg .romn{font-size:clamp(17px,1.4vw,24px);letter-spacing:0.04em;color:var(--accent);font-weight:700;}\n  .marg h2{grid-column:2;font-weight:700;font-size:clamp(23px,1.95vw,34px);line-height:1.14;letter-spacing:-0.01em;}\n  .marg .note{grid-column:2;font-style:italic;color:var(--muted);font-size:clamp(15px,1.15vw,19px);margin-top:10px;line-height:1.45;max-width:25ch;}\n\n  .body{min-width:0;}\n  .body > p{font-size:clamp(18.5px,1.5vw,26px);line-height:1.68;color:var(--ink);max-width:62ch;}\n  .body > p + p{margin-top:1em;}\n  .body .lead-in{font-weight:700;}\n  .body em{font-style:italic;}\n  .sign{font-family:var(--hand);font-size:clamp(24px,2.1vw,32px);color:var(--ink);margin-top:16px;}\n\n  /* numbered course outline */\n  .outline{list-style:none;columns:2;column-gap:clamp(34px,4vw,70px);}\n  @media(max-width:620px){.outline{columns:1;}}\n  .outline li{break-inside:avoid;display:flex;gap:14px;align-items:baseline;\n    padding:14px 0;border-bottom:1px solid var(--line);font-size:clamp(18.5px,1.5vw,26px);}\n  .outline li .on{color:var(--accent);font-weight:700;font-variant-numeric:tabular-nums;min-width:2.4ch;}\n\n  /* definition rows (week, homework, assessment, grading, support) */\n  .defs{display:grid;gap:0;}\n  .defrow{display:grid;grid-template-columns:minmax(140px,230px) 1fr;gap:clamp(16px,2vw,44px);\n    padding:17px 0;border-bottom:1px solid var(--line);align-items:baseline;}\n  .defrow:first-child{border-top:1px solid var(--line);}\n  @media(max-width:560px){.defrow{grid-template-columns:1fr;gap:4px;}}\n  .defrow dt{font-weight:700;font-size:clamp(18.5px,1.45vw,25px);color:var(--accent);}\n  .defrow dd{font-size:clamp(17.5px,1.4vw,23px);color:var(--ink2);line-height:1.58;max-width:58ch;}\n  .defrow dd .q{font-style:italic;}\n\n  /* grading allocation */\n  .grade-table{width:100%;border-collapse:collapse;}\n  .grade-table tr{border-bottom:1px solid var(--line);}\n  .grade-table tr:first-child{border-top:1px solid var(--line);}\n  .grade-table td{padding:17px 0;vertical-align:baseline;font-size:clamp(18px,1.4vw,24px);}\n  .grade-table td.w{font-weight:700;font-variant-numeric:tabular-nums;width:4.5ch;white-space:nowrap;color:var(--accent);}\n  .grade-table td.nm{font-weight:700;width:24%;}\n  .grade-table td.ds{color:var(--ink2);}\n  .grade-table tr.sub td{padding-top:9px;padding-bottom:9px;border-bottom:0;font-size:clamp(15px,1.1vw,19px);}\n  .grade-table tr.sub + tr.sub td,.grade-table tr.sub td{}\n  .grade-table tr.sub td.w{color:var(--ink2);font-weight:400;font-size:clamp(14px,1vw,17px);}\n  .grade-table tr.sub td.nm{font-weight:400;color:var(--ink2);padding-left:clamp(16px,1.6vw,30px);}\n  .grade-table tr.sub-first td{padding-top:16px;}\n  .grade-table tr.sub-last td{padding-bottom:18px;border-bottom:1px solid var(--line);}\n  @media(max-width:600px){.grade-table td.nm{width:34%;}}\n\n  /* colophon */\n  .colophon{padding-top:clamp(40px,5vw,72px);text-align:center;}\n  .colophon .mark{font-family:var(--hand);font-size:clamp(30px,3.6vw,52px);color:var(--accent);line-height:1.1;}\n  .colophon .line{font-size:clamp(12.5px,1.05vw,15px);letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);margin-top:clamp(20px,2.4vw,30px);}\n\n  @media print{\n    body{background:#fff;}\n    .head-meta .lang{display:none;}\n    section,.title-block,.info{break-inside:avoid;}\n    .progress,.toc-btn,.toc-panel,.toc-scrim{display:none;}\n  }\n\n  /* ---------- SCROLL PROGRESS ---------- */\n  .progress{position:fixed;top:0;left:0;right:0;height:3px;z-index:100;background:transparent;}\n  .progress .pfill{height:100%;width:0;background:var(--accent);}\n\n  /* ---------- SECTION REVEAL ---------- */\n  @media(prefers-reduced-motion:no-preference){\n    section.reveal,.colophon.reveal{opacity:0;transform:translateY(22px);transition:opacity .7s ease,transform .7s ease;}\n    section.reveal.in,.colophon.reveal.in{opacity:1;transform:none;}\n  }\n<\u002Fstyle>\n<style>/* cyrillic-ext */\n@font-face {\n  font-family: 'Caveat';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"dd9c44e8-fd99-4e22-a7bc-be36b3e5a5b2\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U ou’re born with.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- COURSE INFORMATION -->\n  <div class=\"info\">\n    <div class=\"cell\"><div class=\"k\" data-en=\"Instructor\" data-es=\"Maestro\">Instructor<\u002Fdiv><div class=\"v\"><b>Mr. Martinez<\u002Fb><\u002Fdiv><\u002Fdiv>\n    <div class=\"cell\"><div class=\"k\" data-en=\"Curriculum\" data-es=\"Currículo\">Curriculum<\u002Fdiv><div class=\"v\">i-Ready Classroom Mathematics<\u002Fdiv><\u002Fdiv>\n    <div class=\"cell\"><div class=\"k\" data-en=\"Grade Level\" data-es=\"Nivel\">Grade Level<\u002Fdiv><div class=\"v\" data-en=\"Sixth Grade\" data-es=\"Sexto Grado\">Sixth Grade<\u002Fdiv><\u002Fdiv>\n    <div class=\"cell\"><div class=\"k\" data-en=\"Meeting Times\" data-es=\"Horario\">Meeting Times<\u002Fdiv><div class=\"v\" data-en=\"Daily, Monday–Friday\" data-es=\"Diario, lunes a viernes\">Daily, Monday–Friday<\u002Fdiv><\u002Fdiv>\n    <div class=\"cell\"><div class=\"k\" data-en=\"Communication\" data-es=\"Comunicación\">Communication<\u002Fdiv><div class=\"v\" data-en=\"ParentSquare (English / Spanish)\" data-es=\"ParentSquare (inglés / español)\">ParentSquare (English / Spanish)<\u002Fdiv><\u002Fdiv>\n    <div class=\"cell\"><div class=\"k\" data-en=\"Scope\" data-es=\"Alcance\">Scope<\u002Fdiv><div class=\"v\" data-en=\"7 units · 33 lessons\" data-es=\"7 unidades · 33 lecciones\">7 units · 33 lessons<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- I. COURSE DESCRIPTION -->\n  <section id=\"s1\" class=\"reveal acc\">\n    <div class=\"marg acc-head\" role=\"button\" tabindex=\"0\" aria-expanded=\"true\" aria-controls=\"p1\">\n      <div class=\"romn\">I.<\u002Fdiv>\n      <h2 data-en=\"Course Description\" data-es=\"Descripción del Curso\">Course Description<\u002Fh2>\n      <div class=\"note\" data-en=\"What we study,&lt;br&gt;and what's expected.\" data-es=\"Qué estudiamos&lt;br&gt;y qué se espera.\">What we study,<br>and what's expected.<\u002Fdiv>\n    <span class=\"chev\" aria-hidden=\"true\"><\u002Fspan><\u002Fdiv>\n    <div class=\"acc-panel\"><div class=\"body\" id=\"p1\">\n      <p data-en=\"This course develops the reasoning at the foundation of all later mathematics. Over the year, students move from arithmetic toward genuine algebraic thinking, working through seven units in a deliberate sequence in which each unit depends on the one before it.\" data-es=\"Este curso desarrolla el razonamiento que es la base de toda la matemática posterior. Durante el año, los estudiantes avanzan de la aritmética hacia un verdadero pensamiento algebraico, recorriendo siete unidades en una secuencia deliberada donde cada unidad depende de la anterior.\">This course develops the reasoning at the foundation of all later mathematics. Over the year, students move from arithmetic toward genuine algebraic thinking, working through seven units in a deliberate sequence in which each unit depends on the one before it.<\u002Fp>\n      <p data-en=\"The expectation is plain: every student is capable of this work, and every student is held to it.\" data-es=\"La expectativa es clara: cada estudiante es capaz de este trabajo, y a cada estudiante se le exige.\">The expectation is plain: every student is capable of this work, and every student is held to it.<\u002Fp>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- II. COURSE OUTLINE -->\n  <section id=\"s2\" class=\"reveal acc\">\n    <div class=\"marg acc-head\" role=\"button\" tabindex=\"0\" aria-expanded=\"true\" aria-controls=\"p2\">\n      <div class=\"romn\">II.<\u002Fdiv>\n      <h2 data-en=\"Course Outline\" data-es=\"Temario del Curso\">Course Outline<\u002Fh2>\n      <div class=\"note\" data-en=\"The seven units,&lt;br&gt;in sequence.\" data-es=\"Las siete unidades,&lt;br&gt;en secuencia.\">The seven units,<br>in sequence.<\u002Fdiv>\n    <span class=\"chev\" aria-hidden=\"true\"><\u002Fspan><\u002Fdiv>\n    <div class=\"acc-panel\"><div class=\"body\" id=\"p2\">\n      <ul class=\"outline\">\n        <li><span class=\"on\">1.<\u002Fspan><span data-en=\"Expressions &amp; Equations\" data-es=\"Expresiones y Ecuaciones\">Expressions &amp; Equations<\u002Fspan><\u002Fli>\n        <li><span class=\"on\">2.<\u002Fspan><span data-en=\"Decimals &amp; Fractions\" data-es=\"Decimales y Fracciones\">Decimals &amp; Fractions<\u002Fspan><\u002Fli>\n        <li><span class=\"on\">3.<\u002Fspan><span data-en=\"Ratio Reasoning\" data-es=\"Razonamiento de Razones\">Ratio Reasoning<\u002Fspan><\u002Fli>\n        <li><span class=\"on\">4.<\u002Fspan><span data-en=\"Rates &amp; Percent\" data-es=\"Tasas y Porcentajes\">Rates &amp; Percent<\u002Fspan><\u002Fli>\n        <li><span class=\"on\">5.<\u002Fspan><span data-en=\"Algebraic Thinking\" data-es=\"Pensamiento Algebraico\">Algebraic Thinking<\u002Fspan><\u002Fli>\n        <li><span class=\"on\">6.<\u002Fspan><span data-en=\"Positive &amp; Negative Numbers\" data-es=\"Números Positivos y Negativos\">Positive &amp; Negative Numbers<\u002Fspan><\u002Fli>\n        <li><span class=\"on\">7.<\u002Fspan><span data-en=\"Statistical Thinking\" data-es=\"Pensamiento Estadístico\">Statistical Thinking<\u002Fspan><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- III. INSTRUCTIONAL METHOD -->\n  <section id=\"s3\" class=\"reveal acc\">\n    <div class=\"marg acc-head\" role=\"button\" tabindex=\"0\" aria-expanded=\"true\" aria-controls=\"p3\">\n      <div class=\"romn\">III.<\u002Fdiv>\n      <h2 data-en=\"Instructional Method\" data-es=\"Método de Enseñanza\">Instructional Method<\u002Fh2>\n      <div class=\"note\" data-en=\"Every lesson follows&lt;br&gt;the same four phases.\" data-es=\"Cada lección sigue&lt;br&gt;las mismas cuatro fases.\">Every lesson follows<br>the same four phases.<\u002Fdiv>\n    <span class=\"chev\" aria-hidden=\"true\"><\u002Fspan><\u002Fdiv>\n    <div class=\"acc-panel\"><div class=\"body\" id=\"p3\">\n      <dl class=\"defs\">\n        <div class=\"defrow\"><dt data-en=\"Explore\" data-es=\"Explora\">Explore<\u002Fdt><dd data-en=\"Students meet a new idea by working a genuine problem before any method is demonstrated. (Day 1)\" data-es=\"Los estudiantes conocen una idea nueva resolviendo un problema real antes de que se muestre cualquier método. (Día 1)\">Students meet a new idea by working a genuine problem before any method is demonstrated. (Day 1)<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"Develop\" data-es=\"Desarrolla\">Develop<\u002Fdt><dd data-en=\"The skill is built deliberately through strategies, models, structured practice, and discussion. (1–3 days)\" data-es=\"La destreza se construye con intención mediante estrategias, modelos, práctica estructurada y discusión. (1–3 días)\">The skill is built deliberately through strategies, models, structured practice, and discussion. (1–3 days)<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"Refine\" data-es=\"Refina\">Refine<\u002Fdt><dd data-en=\"Misconceptions are surfaced and corrected; students prepare fully for the quiz. (Final day)\" data-es=\"Se sacan a la luz y se corrigen los errores; los estudiantes se preparan completamente para la prueba. (Último día)\">Misconceptions are surfaced and corrected; students prepare fully for the quiz. (Final day)<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"Quiz\" data-es=\"Prueba\">Quiz<\u002Fdt><dd data-en=\"Administered the day the next lesson begins. It is always announced in advance.\" data-es=\"Se aplica el día que comienza la siguiente lección. Siempre se anuncia con anticipación.\">Administered the day the next lesson begins. It is always announced in advance.<\u002Fdd><\u002Fdiv>\n      <\u002Fdl>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- IV. WEEKLY SCHEDULE -->\n  <section id=\"s4\" class=\"reveal acc\">\n    <div class=\"marg acc-head\" role=\"button\" tabindex=\"0\" aria-expanded=\"true\" aria-controls=\"p4\">\n      <div class=\"romn\">IV.<\u002Fdiv>\n      <h2 data-en=\"Weekly Schedule\" data-es=\"Horario Semanal\">Weekly Schedule<\u002Fh2>\n      <div class=\"note\" data-en=\"What each part of&lt;br&gt;the week looks like.\" data-es=\"Cómo es cada&lt;br&gt;parte de la semana.\">What each part of<br>the week looks like.<\u002Fdiv>\n    <span class=\"chev\" aria-hidden=\"true\"><\u002Fspan><\u002Fdiv>\n    <div class=\"acc-panel\"><div class=\"body\" id=\"p4\">\n      <dl class=\"defs\">\n        <div class=\"defrow\"><dt data-en=\"Monday – Friday\" data-es=\"Lunes – Viernes\">Monday – Friday<\u002Fdt><dd data-en=\"Class daily, with one nightly practice assignment tied to that day’s lesson.\" data-es=\"Clase diaria, con una tarea de práctica por noche ligada a la lección del día.\">Class daily, with one nightly practice assignment tied to that day’s lesson.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"Weekend\" data-es=\"Fin de semana\">Weekend<\u002Fdt><dd data-en=\"Three i-Ready lessons completed over the weekend.\" data-es=\"Tres lecciones de i-Ready completadas durante el fin de semana.\">Three i-Ready lessons completed over the weekend.<\u002Fdd><\u002Fdiv>\n      <\u002Fdl>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- V. HOMEWORK & PRACTICE -->\n  <section id=\"s5\" class=\"reveal acc\">\n    <div class=\"marg acc-head\" role=\"button\" tabindex=\"0\" aria-expanded=\"true\" aria-controls=\"p5\">\n      <div class=\"romn\">V.<\u002Fdiv>\n      <h2 data-en=\"Homework &amp; Independent Practice\" data-es=\"Tarea y Práctica Independiente\">Homework &amp; Independent Practice<\u002Fh2>\n      <div class=\"note\" data-en=\"What's assigned,&lt;br&gt;and when.\" data-es=\"Qué se asigna,&lt;br&gt;y cuándo.\">What's assigned,<br>and when.<\u002Fdiv>\n    <span class=\"chev\" aria-hidden=\"true\"><\u002Fspan><\u002Fdiv>\n    <div class=\"acc-panel\"><div class=\"body\" id=\"p5\">\n      <dl class=\"defs\">\n        <div class=\"defrow\"><dt data-en=\"Lesson Practice\" data-es=\"Práctica de la Lección\">Lesson Practice<\u002Fdt><dd data-en=\"One assignment per night, Monday through Friday, drawn directly from the current lesson.\" data-es=\"Una tarea por noche, de lunes a viernes, tomada directamente de la lección actual.\">One assignment per night, Monday through Friday, drawn directly from the current lesson.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"Digital Practice &amp; VoyageMath\" data-es=\"Práctica Digital y VoyageMath\">Digital Practice &amp; VoyageMath<\u002Fdt><dd data-en=\"Only when they are not completed in class.\" data-es=\"Solo cuando no se completan en clase.\">Only when they are not completed in class.<\u002Fdd><\u002Fdiv>\n      <\u002Fdl>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- VI. ASSESSMENT -->\n  <section id=\"s6\" class=\"reveal acc\">\n    <div class=\"marg acc-head\" role=\"button\" tabindex=\"0\" aria-expanded=\"true\" aria-controls=\"p6\">\n      <div class=\"romn\">VI.<\u002Fdiv>\n      <h2 data-en=\"Assessment\" data-es=\"Evaluación\">Assessment<\u002Fh2>\n      <div class=\"note\" data-en=\"How learning&lt;br&gt;is checked.\" data-es=\"Cómo se evalúa&lt;br&gt;el aprendizaje.\">How learning<br>is checked.<\u002Fdiv>\n    <span class=\"chev\" aria-hidden=\"true\"><\u002Fspan><\u002Fdiv>\n    <div class=\"acc-panel\"><div class=\"body\" id=\"p6\">\n      <dl class=\"defs\">\n        <div class=\"defrow\"><dt data-en=\"Lesson Quiz\" data-es=\"Prueba de Lección\">Lesson Quiz<\u002Fdt><dd data-en=\"One per lesson, given the day the next lesson begins.\" data-es=\"Una por lección, el día que comienza la siguiente.\">One per lesson, given the day the next lesson begins.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"Unit Assessment\" data-es=\"Evaluación de Unidad\">Unit Assessment<\u002Fdt><dd data-en=\"A two-day assessment at the close of each unit.\" data-es=\"Una evaluación de dos días al cierre de cada unidad.\">A two-day assessment at the close of each unit.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"i-Ready Diagnostic\" data-es=\"Diagnóstico i-Ready\">i-Ready Diagnostic<\u002Fdt><dd data-en=\"Administered three times across the year. Not graded; it measures growth.\" data-es=\"Se aplica tres veces durante el año. No se califica; mide el crecimiento.\">Administered three times across the year. Not graded; it measures growth.<\u002Fdd><\u002Fdiv>\n      <\u002Fdl>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- VII. PROJECTS -->\n  <section id=\"s7p\" class=\"reveal acc\">\n    <div class=\"marg acc-head\" role=\"button\" tabindex=\"0\" aria-expanded=\"true\" aria-controls=\"p7\">\n      <div class=\"romn\">VII.<\u002Fdiv>\n      <h2 data-en=\"Projects\" data-es=\"Proyectos\">Projects<\u002Fh2>\n      <div class=\"note\" data-en=\"Three projects&lt;br&gt;across the year.\" data-es=\"Tres proyectos&lt;br&gt;durante el año.\">Three projects<br>across the year.<\u002Fdiv>\n    <span class=\"chev\" aria-hidden=\"true\"><\u002Fspan><\u002Fdiv>\n    <div class=\"acc-panel\"><div class=\"body\" id=\"p7\">\n      <dl class=\"defs\">\n        <div class=\"defrow\"><dt data-en=\"100 i-Ready Challenge\" data-es=\"Desafío de 100 i-Ready\">100 i-Ready Challenge<\u002Fdt><dd data-en=\"A year-long push to complete 100 personalized i-Ready lessons by June, each student at their own pace.\" data-es=\"Un esfuerzo durante todo el año para completar 100 lecciones personalizadas de i-Ready para junio, cada estudiante a su propio ritmo.\">A year-long push to complete 100 personalized i-Ready lessons by June, each student at their own pace.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"Data Detective Project\" data-es=\"Proyecto Detective de Datos\">Data Detective Project<\u002Fdt><dd data-en=\"Students pose a question, collect and organize real data, and interpret what it reveals — statistical thinking applied end to end.\" data-es=\"Los estudiantes plantean una pregunta, recopilan y organizan datos reales, e interpretan lo que revelan — pensamiento estadístico aplicado de principio a fin.\">Students pose a question, collect and organize real data, and interpret what it reveals — statistical thinking applied end to end.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"Lights, Camera, Budget!\" data-es=\"¡Luces, Cámara, Presupuesto!\">Lights, Camera, Budget!<\u002Fdt><dd data-en=\"A multi-day investigation where students plan a production within a fixed budget, applying rates, percentages, and ratio reasoning.\" data-es=\"Una investigación de varios días donde los estudiantes planifican una producción dentro de un presupuesto fijo, aplicando tasas, porcentajes y razonamiento de razones.\">A multi-day investigation where students plan a production within a fixed budget, applying rates, percentages, and ratio reasoning.<\u002Fdd><\u002Fdiv>\n      <\u002Fdl>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- VIII. GRADING -->\n  <section id=\"s7\" class=\"reveal acc\">\n    <div class=\"marg acc-head\" role=\"button\" tabindex=\"0\" aria-expanded=\"true\" aria-controls=\"p8\">\n      <div class=\"romn\">VIII.<\u002Fdiv>\n      <h2 data-en=\"Grade Composition\" data-es=\"Composición de la Calificación\">Grade Composition<\u002Fh2>\n      <div class=\"note\" data-en=\"What makes up&lt;br&gt;the grade.\" data-es=\"Qué compone&lt;br&gt;la calificación.\">What makes up<br>the grade.<\u002Fdiv>\n    <span class=\"chev\" aria-hidden=\"true\"><\u002Fspan><\u002Fdiv>\n    <div class=\"acc-panel\"><div class=\"body\" id=\"p8\">\n      <table class=\"grade-table\">\n        <tbody><tr><td class=\"w\">80%<\u002Ftd><td class=\"nm\" data-en=\"Academic\" data-es=\"Académico\">Academic<\u002Ftd><td class=\"ds\" data-en=\"Demonstrated mastery, in four equal parts:\" data-es=\"Dominio demostrado, en cuatro partes iguales:\">Demonstrated mastery, in four equal parts:<\u002Ftd><\u002Ftr>\n        <tr class=\"sub sub-first\"><td class=\"w\">20%<\u002Ftd><td class=\"nm\" data-en=\"Quizzes\" data-es=\"Pruebas\">Quizzes<\u002Ftd><td class=\"ds\" data-en=\"Weekly lesson quizzes.\" data-es=\"Pruebas semanales de lección.\">Weekly lesson quizzes.<\u002Ftd><\u002Ftr>\n        <tr class=\"sub\"><td class=\"w\">20%<\u002Ftd><td class=\"nm\" data-en=\"Assessments\" data-es=\"Evaluaciones\">Assessments<\u002Ftd><td class=\"ds\" data-en=\"End-of-unit assessments.\" data-es=\"Evaluaciones al cierre de cada unidad.\">End-of-unit assessments.<\u002Ftd><\u002Ftr>\n        <tr class=\"sub\"><td class=\"w\">20%<\u002Ftd><td class=\"nm\" data-en=\"VoyageMath\" data-es=\"VoyageMath\">VoyageMath<\u002Ftd><td class=\"ds\" data-en=\"Targeted skill-building program.\" data-es=\"Programa enfocado en desarrollar destrezas.\">Targeted skill-building program.<\u002Ftd><\u002Ftr>\n        <tr class=\"sub sub-last\"><td class=\"w\">20%<\u002Ftd><td class=\"nm\" data-en=\"Digital Practice\" data-es=\"Práctica Digital\">Digital Practice<\u002Ftd><td class=\"ds\" data-en=\"Standards-based mastery through i-Ready.\" data-es=\"Dominio basado en estándares mediante i-Ready.\">Standards-based mastery through i-Ready.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"w\">10%<\u002Ftd><td class=\"nm\" data-en=\"Project\" data-es=\"Proyecto\">Project<\u002Ftd><td class=\"ds\" data-en=\"Applied, multi-day mathematical investigations.\" data-es=\"Investigaciones matemáticas aplicadas de varios días.\">Applied, multi-day mathematical investigations.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"w\">5%<\u002Ftd><td class=\"nm\" data-en=\"Practice\" data-es=\"Práctica\">Practice<\u002Ftd><td class=\"ds\" data-en=\"Daily work and class participation.\" data-es=\"Trabajo diario y participación en clase.\">Daily work and class participation.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"w\">5%<\u002Ftd><td class=\"nm\" data-en=\"Work Habits\" data-es=\"Hábitos de Trabajo\">Work Habits<\u002Ftd><td class=\"ds\" data-en=\"Preparation, organization, and follow-through.\" data-es=\"Preparación, organización y constancia.\">Preparation, organization, and follow-through.<\u002Ftd><\u002Ftr>\n      <\u002Ftbody><\u002Ftable>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- IX. EXPECTATIONS -->\n  <section id=\"s8\" class=\"reveal acc\">\n    <div class=\"marg acc-head\" role=\"button\" tabindex=\"0\" aria-expanded=\"true\" aria-controls=\"p9\">\n      <div class=\"romn\">IX.<\u002Fdiv>\n      <h2 data-en=\"Classroom Expectations\" data-es=\"Expectativas del Aula\">Classroom Expectations<\u002Fh2>\n      <div class=\"note\" data-en=\"Five rules&lt;br&gt;for the room.\" data-es=\"Cinco reglas&lt;br&gt;para el aula.\">Five rules<br>for the room.<\u002Fdiv>\n    <span class=\"chev\" aria-hidden=\"true\"><\u002Fspan><\u002Fdiv>\n    <div class=\"acc-panel\"><div class=\"body\" id=\"p9\">\n      <dl class=\"defs\">\n        <div class=\"defrow\"><dt data-en=\"Strong Start\" data-es=\"Inicio Fuerte\">Strong Start<\u002Fdt><dd data-en=\"Arrive prepared. Class begins the moment you enter.\" data-es=\"Llega preparado. La clase comienza al entrar.\">Arrive prepared. Class begins the moment you enter.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"Honest Effort\" data-es=\"Esfuerzo Honesto\">Honest Effort<\u002Fdt><dd data-en=\"Genuine thinking is expected, and it always outweighs a copied answer.\" data-es=\"Se espera pensamiento genuino, y siempre vale más que una respuesta copiada.\">Genuine thinking is expected, and it always outweighs a copied answer.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"Respect\" data-es=\"Respeto\">Respect<\u002Fdt><dd data-en=\"Critique ideas, never people.\" data-es=\"Critica las ideas, nunca a las personas.\">Critique ideas, never people.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"Ask\" data-es=\"Pregunta\">Ask<\u002Fdt><dd data-en=\"“I don’t understand it yet” is welcome and expected.\" data-es=\"“Todavía no lo entiendo” es bienvenido y esperado.\">“I don’t understand it yet” is welcome and expected.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"Ownership\" data-es=\"Responsabilidad\">Ownership<\u002Fdt><dd data-en=\"Know your own progress and arrive on time.\" data-es=\"Conoce tu propio progreso y llega a tiempo.\">Know your own progress and arrive on time.<\u002Fdd><\u002Fdiv>\n      <\u002Fdl>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- X. SUPPORT -->\n  <section id=\"s9\" class=\"reveal acc\">\n    <div class=\"marg acc-head\" role=\"button\" tabindex=\"0\" aria-expanded=\"true\" aria-controls=\"p10\">\n      <div class=\"romn\">X.<\u002Fdiv>\n      <h2 data-en=\"Academic Support\" data-es=\"Apoyo Académico\">Academic Support<\u002Fh2>\n      <div class=\"note\" data-en=\"Where to&lt;br&gt;get help.\" data-es=\"Dónde&lt;br&gt;conseguir ayuda.\">Where to<br>get help.<\u002Fdiv>\n    <span class=\"chev\" aria-hidden=\"true\"><\u002Fspan><\u002Fdiv>\n    <div class=\"acc-panel\"><div class=\"body\" id=\"p10\">\n      <dl class=\"defs\">\n        <div class=\"defrow\"><dt data-en=\"In Class\" data-es=\"En Clase\">In Class<\u002Fdt><dd data-en=\"Ask during work time, consult your table group, or signal the instructor.\" data-es=\"Pregunta durante el tiempo de trabajo, consulta a tu grupo, o avísale al maestro.\">Ask during work time, consult your table group, or signal the instructor.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"Intervention\" data-es=\"Intervención\">Intervention<\u002Fdt><dd data-en=\"Weekly small-group support, scheduled into the week.\" data-es=\"Apoyo semanal en grupo pequeño, programado en la semana.\">Weekly small-group support, scheduled into the week.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"i-Ready\" data-es=\"i-Ready\">i-Ready<\u002Fdt><dd data-en=\"Personalized practice, available whenever the student logs in.\" data-es=\"Práctica personalizada, disponible cuando el estudiante inicie sesión.\">Personalized practice, available whenever the student logs in.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"Families\" data-es=\"Familias\">Families<\u002Fdt><dd data-en=\"Contact Mr. Martinez through ParentSquare, in English or Spanish.\" data-es=\"Comuníquese con el Sr. Martinez por ParentSquare, en inglés o español.\">Contact Mr. Martinez through ParentSquare, in English or Spanish.<\u002Fdd><\u002Fdiv>\n      <\u002Fdl>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n    <section id=\"sret\" class=\"reveal acc\">\n    <div class=\"marg acc-head\" role=\"button\" tabindex=\"0\" aria-expanded=\"true\" aria-controls=\"pret\">\n      <div class=\"romn\">XI.<\u002Fdiv>\n      <h2 data-en=\"Retakes &amp; Revisions\" data-es=\"Repeticiones y Revisiones\">Retakes &amp; Revisions<\u002Fh2>\n      <div class=\"note\" data-en=\"A low score is a snapshot,&lt;br&gt;not a verdict.\" data-es=\"Una calificación baja es una foto,&lt;br&gt;no un veredicto.\">A low score is a snapshot,<br>not a verdict.<\u002Fdiv>\n    <span class=\"chev\" aria-hidden=\"true\"><\u002Fspan><\u002Fdiv>\n    <div class=\"acc-panel\"><div class=\"body\" id=\"pret\">\n      <dl class=\"defs\">\n        <div class=\"defrow\"><dt data-en=\"What Can Be Retaken\" data-es=\"Qué Se Puede Repetir\">What Can Be Retaken<\u002Fdt><dd data-en=\"Academic-category assessments — quizzes, math assessments, science quizzes. Missions and projects can be revised: improve the work and resubmit. Practice and Wayground can be replayed anytime.\" data-es=\"Las evaluaciones de la categoría Académica — quizzes, evaluaciones de matemáticas, quizzes de ciencias. Las misiones y proyectos se pueden revisar: mejora el trabajo y vuélvelo a entregar. Practice y Wayground se pueden volver a jugar cuando quieras.\">Academic-category assessments — quizzes, math assessments, science quizzes. Missions and projects can be revised: improve the work and resubmit. Practice and Wayground can be replayed anytime.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"Earn the Retake First\" data-es=\"Primero Se Gana\">Earn the Retake First<\u002Fdt><dd data-en=\"Before retaking, complete corrections on the original — the error, why it happened, and the problem reworked correctly — or attend one intervention session on that skill. Relearning comes before reassessment, always.\" data-es=\"Antes de repetir, completa las correcciones del original — el error, por qué ocurrió, y el problema resuelto correctamente — o asiste a una sesión de intervención sobre esa destreza. Primero se reaprende, después se reevalúa. Siempre.\">Before retaking, complete corrections on the original — the error, why it happened, and the problem reworked correctly — or attend one intervention session on that skill. Relearning comes before reassessment, always.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"Window\" data-es=\"Plazo\">Window<\u002Fdt><dd data-en=\"5 school days from the Monday the grade posts in PowerSchool.\" data-es=\"5 días escolares a partir del lunes en que la calificación aparece en PowerSchool.\">5 school days from the Monday the grade posts in PowerSchool.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"When &amp; Where\" data-es=\"Cuándo y Dónde\">When &amp; Where<\u002Fdt><dd data-en=\"Lunch intervention or the Thursday intervention block — never during class time.\" data-es=\"Intervención de almuerzo o el bloque de intervención del jueves — nunca durante la clase.\">Lunch intervention or the Thursday intervention block — never during class time.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"One Retake\" data-es=\"Una Repetición\">One Retake<\u002Fdt><dd data-en=\"One retake per assessment. The higher score fully replaces the old one — your grade reports what you know now.\" data-es=\"Una repetición por evaluación. La calificación más alta reemplaza por completo a la anterior — tu calificación refleja lo que sabes ahora.\">One retake per assessment. The higher score fully replaces the old one — your grade reports what you know now.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"You Start It\" data-es=\"Tú Lo Inicias\">You Start It<\u002Fdt><dd data-en=\"Ask me, pick your intervention time, done. No parent email needed.\" data-es=\"Pregúntame, elige tu horario de intervención, y listo. No se necesita correo de tus padres.\">Ask me, pick your intervention time, done. No parent email needed.<\u002Fdd><\u002Fdiv>\n      <\u002Fdl>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"sabs\" class=\"reveal acc\">\n    <div class=\"marg acc-head\" role=\"button\" tabindex=\"0\" aria-expanded=\"true\" aria-controls=\"pabs\">\n      <div class=\"romn\">XII.<\u002Fdiv>\n      <h2 data-en=\"Absences &amp; Missing Work\" data-es=\"Ausencias y Trabajo Pendiente\">Absences &amp; Missing Work<\u002Fh2>\n      <div class=\"note\" data-en=\"Life happens. Here’s&lt;br&gt;the recovery routine.\" data-es=\"La vida pasa. Esta es&lt;br&gt;la rutina de recuperación.\">Life happens. Here’s<br>the recovery routine.<\u002Fdiv>\n    <span class=\"chev\" aria-hidden=\"true\"><\u002Fspan><\u002Fdiv>\n    <div class=\"acc-panel\"><div class=\"body\" id=\"pabs\">\n      <dl class=\"defs\">\n        <div class=\"defrow\"><dt data-en=\"The Routine\" data-es=\"La Rutina\">The Routine<\u002Fdt><dd data-en=\"Check Google Classroom the same day → do what you can → ask me at the start of class. You own your make-up work — no parent email needed.\" data-es=\"Revisa Google Classroom el mismo día → haz lo que puedas → pregúntame al inicio de la clase. El trabajo pendiente es tu responsabilidad — no se necesita correo de tus padres.\">Check Google Classroom the same day → do what you can → ask me at the start of class. You own your make-up work — no parent email needed.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"Window\" data-es=\"Plazo\">Window<\u002Fdt><dd data-en=\"5 school days from your return. Absent 3+ days? Message me and we’ll build a plan together.\" data-es=\"5 días escolares a partir de tu regreso. ¿Faltaste 3 días o más? Mándame un mensaje y armamos un plan juntos.\">5 school days from your return. Absent 3+ days? Message me and we’ll build a plan together.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"Due-Day Work\" data-es=\"Trabajo del Día\">Due-Day Work<\u002Fdt><dd data-en=\"Work due the day you were absent is due when you return — no penalty.\" data-es=\"El trabajo que se entregaba el día de tu ausencia se entrega cuando regreses — sin penalización.\">Work due the day you were absent is due when you return — no penalty.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"Missed Quizzes\" data-es=\"Quizzes Perdidos\">Missed Quizzes<\u002Fdt><dd data-en=\"Made up at lunch intervention or the Thursday block, within the week.\" data-es=\"Se recuperan en la intervención de almuerzo o el bloque del jueves, dentro de la misma semana.\">Made up at lunch intervention or the Thursday block, within the week.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"Labs &amp; Group Work\" data-es=\"Laboratorios y Trabajo en Grupo\">Labs &amp; Group Work<\u002Fdt><dd data-en=\"Labs and group mission work that can’t be repeated get an alternative assignment covering the same standard — I’ll assign it.\" data-es=\"Los laboratorios y el trabajo de misión en grupo que no se pueden repetir se reemplazan con una actividad alternativa del mismo estándar — yo te la asigno.\">Labs and group mission work that can’t be repeated get an alternative assignment covering the same standard — I’ll assign it.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"Late Work\" data-es=\"Trabajo Tardío\">Late Work<\u002Fdt><dd data-en=\"You were here but didn’t turn it in: accepted within the week for full Academic credit. Lateness is recorded in Work Habits instead — your grade reports what you know; Work Habits reports how you’re working.\" data-es=\"Estuviste presente pero no lo entregaste: se acepta dentro de la semana con crédito Académico completo. La tardanza se registra en Hábitos de Trabajo — tu calificación refleja lo que sabes; Hábitos de Trabajo refleja cómo estás trabajando.\">You were here but didn’t turn it in: accepted within the week for full Academic credit. Lateness is recorded in Work Habits instead — your grade reports what you know; Work Habits reports how you’re working.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"To Excuse an Absence\" data-es=\"Para Justificar\">To Excuse an Absence<\u002Fdt><dd data-en=\"Send a note or doctor’s note to the front office.\" data-es=\"Envía una nota o comprobante médico a la oficina principal.\">Send a note or doctor’s note to the front office.<\u002Fdd><\u002Fdiv>\n      <\u002Fdl>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"sai\" class=\"reveal acc\">\n    <div class=\"marg acc-head\" role=\"button\" tabindex=\"0\" aria-expanded=\"true\" aria-controls=\"pai\">\n      <div class=\"romn\">XIII.<\u002Fdiv>\n      <h2 data-en=\"AI &amp; Academic Honesty\" data-es=\"IA y Honestidad Académica\">AI &amp; Academic Honesty<\u002Fh2>\n      <div class=\"note\" data-en=\"Your grade means one thing:&lt;br&gt;what YOU know and can do.\" data-es=\"Tu calificación significa una cosa:&lt;br&gt;lo que TÚ sabes y puedes hacer.\">Your grade means one thing:<br>what YOU know and can do.<\u002Fdiv>\n    <span class=\"chev\" aria-hidden=\"true\"><\u002Fspan><\u002Fdiv>\n    <div class=\"acc-panel\"><div class=\"body\" id=\"pai\">\n      <dl class=\"defs\">\n        <div class=\"defrow\"><dt data-en=\"The Core Rule\" data-es=\"La Regla Central\">The Core Rule<\u002Fdt><dd data-en=\"Every grade in this class is evidence of your mastery. If AI does the thinking, there is no evidence — there is nothing to grade. Turning in AI work as your own is cheating yourself out of the only thing this class exists to give you.\" data-es=\"Cada calificación en esta clase es evidencia de tu dominio. Si la IA hace el pensamiento, no hay evidencia — no hay nada que calificar. Entregar trabajo de IA como tuyo es robarte a ti mismo lo único que esta clase existe para darte.\">Every grade in this class is evidence of your mastery. If AI does the thinking, there is no evidence — there is nothing to grade. Turning in AI work as your own is cheating yourself out of the only thing this class exists to give you.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"How You Prove Mastery\" data-es=\"Cómo Demuestras Dominio\">How You Prove Mastery<\u002Fdt><dd data-en=\"You show your work, explain your reasoning, and defend your answers — in your notebook, at the board, and in conversation with me. If you can’t explain it, you didn’t do it — and we’ll both know within one question.\" data-es=\"Muestras tu trabajo, explicas tu razonamiento y defiendes tus respuestas — en tu cuaderno, en el pizarrón y en conversación conmigo. Si no lo puedes explicar, no lo hiciste — y los dos lo sabremos con una sola pregunta.\">You show your work, explain your reasoning, and defend your answers — in your notebook, at the board, and in conversation with me. If you can’t explain it, you didn’t do it — and we’ll both know within one question.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"When AI Is Off-Limits\" data-es=\"Cuándo Está Prohibida\">When AI Is Off-Limits<\u002Fdt><dd data-en=\"Almost always: anything submitted for a grade — assessments, quizzes, missions, written responses, math work, homework. Doing the assignment is the learning; outsourcing it deletes the learning.\" data-es=\"Casi siempre: todo lo que se entrega para calificación — evaluaciones, quizzes, misiones, respuestas escritas, trabajo de matemáticas, tarea. Hacer la tarea es el aprendizaje; delegarla borra el aprendizaje.\">Almost always: anything submitted for a grade — assessments, quizzes, missions, written responses, math work, homework. Doing the assignment is the learning; outsourcing it deletes the learning.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"When AI Is Allowed\" data-es=\"Cuándo Se Permite\">When AI Is Allowed<\u002Fdt><dd data-en=\"Only when I say so, out loud, for that specific task — and I’ll say exactly how. If I didn’t say it, the answer is no. When in doubt, ask before, not after.\" data-es=\"Solo cuando yo lo diga, en voz alta, para esa tarea específica — y diré exactamente cómo. Si no lo dije, la respuesta es no. Si tienes duda, pregunta antes, no después.\">Only when I say so, out loud, for that specific task — and I’ll say exactly how. If I didn’t say it, the answer is no. When in doubt, ask before, not after.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"A Fact Worth Knowing\" data-es=\"Un Dato Importante\">A Fact Worth Knowing<\u002Fdt><dd data-en=\"Most AI tools require users to be 13+ with parent permission. As a 6th grader, most of these tools aren’t yours to use yet — that’s their rule before it’s mine.\" data-es=\"La mayoría de las herramientas de IA requieren tener 13 años o más con permiso de los padres. Como estudiante de 6.º grado, la mayoría todavía no son para ti — esa es su regla antes de ser la mía.\">Most AI tools require users to be 13+ with parent permission. As a 6th grader, most of these tools aren’t yours to use yet — that’s their rule before it’s mine.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"Copying Is Copying\" data-es=\"Copiar Es Copiar\">Copying Is Copying<\u002Fdt><dd data-en=\"The same rules apply to copying a classmate, a website, or a sibling. The source doesn’t matter; presenting thinking that isn’t yours does.\" data-es=\"Las mismas reglas aplican si copias a un compañero, un sitio web o un hermano. La fuente no importa; presentar un pensamiento que no es tuyo, sí.\">The same rules apply to copying a classmate, a website, or a sibling. The source doesn’t matter; presenting thinking that isn’t yours does.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"What Happens\" data-es=\"Qué Pasa\">What Happens<\u002Fdt><dd data-en=\"The work counts as no evidence of mastery — you’ll re-demonstrate it with me, in person, at intervention. The incident is documented and your family is contacted; repeat incidents go to administration. The retake door stays open — the goal is always real mastery, shown by you.\" data-es=\"El trabajo cuenta como cero evidencia de dominio — lo volverás a demostrar conmigo, en persona, en intervención. El incidente se documenta y se contacta a tu familia; los incidentes repetidos van a la administración. La puerta de la repetición sigue abierta — la meta siempre es dominio real, demostrado por ti.\">The work counts as no evidence of mastery — you’ll re-demonstrate it with me, in person, at intervention. The incident is documented and your family is contacted; repeat incidents go to administration. The retake door stays open — the goal is always real mastery, shown by you.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"Fairness Goes Both Ways\" data-es=\"La Justicia Va en Ambas Direcciones\">Fairness Goes Both Ways<\u002Fdt><dd data-en=\"I use AI tools to help build class materials — and I check, correct, and stand behind every one of them. That’s the standard: the human owns the work. Same standard for you.\" data-es=\"Yo uso herramientas de IA para ayudar a crear materiales de clase — y reviso, corrijo y respondo por cada uno de ellos. Ese es el estándar: el humano es dueño del trabajo. El mismo estándar aplica para ti.\">I use AI tools to help build class materials — and I check, correct, and stand behind every one of them. That’s the standard: the human owns the work. Same standard for you.<\u002Fdd><\u002Fdiv>\n      <\u002Fdl>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n<!-- COLOPHON -->\n  <div class=\"colophon reveal\">\n    <div class=\"mark\" data-en=\"Show up. Try honestly.\" data-es=\"Asiste. Esfuérzate con honestidad.\">Show up. Try honestly.<\u002Fdiv>\n    <div class=\"line\">Mr. Martinez · Grade 6 Mathematics<\u002Fdiv>\n  <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <div id=\"sub-sci\" hidden=\"\">\n<!-- TITLE -->\n  <div class=\"title-block\">\n    <div class=\"overline\" data-en=\"Course Syllabus\" data-es=\"Programa del Curso\">Course Syllabus<\u002Fdiv>\n    <h1 data-en=\"Grade 6 Science\" data-es=\"Ciencias de 6.º Grado\">Grade 6 Science<\u002Fh1>\n    <div class=\"epigraph\" data-en=\"Science begins with a question — and the courage to test the answer.\" data-es=\"La ciencia comienza con una pregunta — y el valor de poner a prueba la respuesta.\">Science begins with a question — and the courage to test the answer.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- COURSE INFORMATION -->\n  <div class=\"info\">\n    <div class=\"cell\"><div class=\"k\" data-en=\"Instructor\" data-es=\"Maestro\">Instructor<\u002Fdiv><div class=\"v\"><b>Mr. Martinez<\u002Fb><\u002Fdiv><\u002Fdiv>\n    <div class=\"cell\"><div class=\"k\" data-en=\"Curriculum\" data-es=\"Currículo\">Curriculum<\u002Fdiv><div class=\"v\">STEMscopes NGSS 3D · California Integrated<\u002Fdiv><\u002Fdiv>\n    <div class=\"cell\"><div class=\"k\" data-en=\"Grade Level\" data-es=\"Nivel\">Grade Level<\u002Fdiv><div class=\"v\" data-en=\"Sixth Grade\" data-es=\"Sexto Grado\">Sixth Grade<\u002Fdiv><\u002Fdiv>\n    <div class=\"cell\"><div class=\"k\" data-en=\"Meeting Times\" data-es=\"Horario\">Meeting Times<\u002Fdiv><div class=\"v\" data-en=\"Daily, Monday–Friday\" data-es=\"Diario, lunes a viernes\">Daily, Monday–Friday<\u002Fdiv><\u002Fdiv>\n    <div class=\"cell\"><div class=\"k\" data-en=\"Communication\" data-es=\"Comunicación\">Communication<\u002Fdiv><div class=\"v\" data-en=\"ParentSquare (English / Spanish)\" data-es=\"ParentSquare (inglés / español)\">ParentSquare (English / Spanish)<\u002Fdiv><\u002Fdiv>\n    <div class=\"cell\"><div class=\"k\" data-en=\"Scope\" data-es=\"Alcance\">Scope<\u002Fdiv><div class=\"v\" data-en=\"4 segments · 28 weeks\" data-es=\"4 segmentos · 28 semanas\">4 segments · 28 weeks<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <section id=\"sci-s1\" class=\"reveal acc\">\n    <div class=\"marg acc-head\" role=\"button\" tabindex=\"0\" aria-expanded=\"true\" aria-controls=\"sci-p1\">\n      <div class=\"romn\">I.<\u002Fdiv>\n      <h2 data-en=\"Course Description\" data-es=\"Descripción del Curso\">Course Description<\u002Fh2>\n      <div class=\"note\" data-en=\"What we study,&lt;br&gt;and what's expected.\" data-es=\"Qué estudiamos&lt;br&gt;y qué se espera.\">What we study,<br>and what's expected.<\u002Fdiv>\n    <span class=\"chev\" aria-hidden=\"true\"><\u002Fspan><\u002Fdiv>\n    <div class=\"acc-panel\"><div class=\"body\" id=\"sci-p1\">\n      <p data-en=\"This course weaves Earth, life, and physical science into one year-long storyline. Each segment opens with an anchoring phenomenon — a real question about the world — and students build the science needed to explain it through hands-on investigation, modeling, and argument from evidence.\" data-es=\"Este curso entrelaza las ciencias de la Tierra, de la vida y físicas en una sola historia de todo el año. Cada segmento abre con un fenómeno ancla — una pregunta real sobre el mundo — y los estudiantes construyen la ciencia necesaria para explicarlo mediante investigación práctica, modelos y argumentos basados en evidencia.\">This course weaves Earth, life, and physical science into one year-long storyline. Each segment opens with an anchoring phenomenon — a real question about the world — and students build the science needed to explain it through hands-on investigation, modeling, and argument from evidence.<\u002Fp>\n      <p data-en=\"The expectation is plain: every student is capable of this work, and every student is held to it.\" data-es=\"La expectativa es clara: cada estudiante es capaz de este trabajo, y a cada estudiante se le exige.\">The expectation is plain: every student is capable of this work, and every student is held to it.<\u002Fp>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"sci-s2\" class=\"reveal acc\">\n    <div class=\"marg acc-head\" role=\"button\" tabindex=\"0\" aria-expanded=\"true\" aria-controls=\"sci-p2\">\n      <div class=\"romn\">II.<\u002Fdiv>\n      <h2 data-en=\"Course Outline\" data-es=\"Temario del Curso\">Course Outline<\u002Fh2>\n      <div class=\"note\" data-en=\"The four segments,&lt;br&gt;in sequence.\" data-es=\"Los cuatro segmentos,&lt;br&gt;en secuencia.\">The four segments,<br>in sequence.<\u002Fdiv>\n    <span class=\"chev\" aria-hidden=\"true\"><\u002Fspan><\u002Fdiv>\n    <div class=\"acc-panel\"><div class=\"body\" id=\"sci-p2\">\n      <ul class=\"outline\">\n        <li><span class=\"on\">1.<\u002Fspan><span data-en=\"Systems &amp; Subsystems in Earth and Life Science — 8 weeks\" data-es=\"Sistemas y Subsistemas en Ciencias de la Tierra y de la Vida — 8 semanas\">Systems &amp; Subsystems in Earth and Life Science — 8 weeks<\u002Fspan><\u002Fli>\n        <li><span class=\"on\">2.<\u002Fspan><span data-en=\"Earth System Interactions Cause Weather — 8 weeks\" data-es=\"Las Interacciones del Sistema Terrestre Causan el Clima — 8 semanas\">Earth System Interactions Cause Weather — 8 weeks<\u002Fspan><\u002Fli>\n        <li><span class=\"on\">3.<\u002Fspan><span data-en=\"Causes &amp; Effects of Regional Climates — 8 weeks\" data-es=\"Causas y Efectos de los Climas Regionales — 8 semanas\">Causes &amp; Effects of Regional Climates — 8 weeks<\u002Fspan><\u002Fli>\n        <li><span class=\"on\">4.<\u002Fspan><span data-en=\"Effects of Global Warming on Living Systems — 4 weeks\" data-es=\"Efectos del Calentamiento Global en los Sistemas Vivos — 4 semanas\">Effects of Global Warming on Living Systems — 4 weeks<\u002Fspan><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"sci-s3\" class=\"reveal acc\">\n    <div class=\"marg acc-head\" role=\"button\" tabindex=\"0\" aria-expanded=\"true\" aria-controls=\"sci-p3\">\n      <div class=\"romn\">III.<\u002Fdiv>\n      <h2 data-en=\"Instructional Method\" data-es=\"Método de Enseñanza\">Instructional Method<\u002Fh2>\n      <div class=\"note\" data-en=\"Every scope follows&lt;br&gt;the 5E model.\" data-es=\"Cada tema sigue&lt;br&gt;el modelo 5E.\">Every scope follows<br>the 5E model.<\u002Fdiv>\n    <span class=\"chev\" aria-hidden=\"true\"><\u002Fspan><\u002Fdiv>\n    <div class=\"acc-panel\"><div class=\"body\" id=\"sci-p3\">\n      <dl class=\"defs\">\n        <div class=\"defrow\"><dt data-en=\"Engage\" data-es=\"Involucra\">Engage<\u002Fdt><dd data-en=\"Each topic opens with an investigative phenomenon and a hook — students wonder first, before anything is explained.\" data-es=\"Cada tema abre con un fenómeno investigativo y un gancho — los estudiantes se preguntan primero, antes de cualquier explicación.\">Each topic opens with an investigative phenomenon and a hook — students wonder first, before anything is explained.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"Explore &amp; Explain\" data-es=\"Explora y Explica\">Explore &amp; Explain<\u002Fdt><dd data-en=\"Hands-on investigations paired with readings and discussion, building the ideas needed to explain the phenomenon.\" data-es=\"Investigaciones prácticas junto con lecturas y discusión, construyendo las ideas necesarias para explicar el fenómeno.\">Hands-on investigations paired with readings and discussion, building the ideas needed to explain the phenomenon.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"Elaborate\" data-es=\"Amplía\">Elaborate<\u002Fdt><dd data-en=\"Students extend the science through connections to reading, writing, and mathematics.\" data-es=\"Los estudiantes amplían la ciencia mediante conexiones con la lectura, la escritura y las matemáticas.\">Students extend the science through connections to reading, writing, and mathematics.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"Evaluate\" data-es=\"Evalúa\">Evaluate<\u002Fdt><dd data-en=\"Each scope closes with a written scientific explanation (claim–evidence–reasoning) and a scope assessment.\" data-es=\"Cada tema cierra con una explicación científica escrita (afirmación–evidencia–razonamiento) y una evaluación del tema.\">Each scope closes with a written scientific explanation (claim–evidence–reasoning) and a scope assessment.<\u002Fdd><\u002Fdiv>\n      <\u002Fdl>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"sci-s4\" class=\"reveal acc\">\n    <div class=\"marg acc-head\" role=\"button\" tabindex=\"0\" aria-expanded=\"true\" aria-controls=\"sci-p4\">\n      <div class=\"romn\">IV.<\u002Fdiv>\n      <h2 data-en=\"Weekly Schedule\" data-es=\"Horario Semanal\">Weekly Schedule<\u002Fh2>\n      <div class=\"note\" data-en=\"What each part of&lt;br&gt;the week looks like.\" data-es=\"Cómo es cada&lt;br&gt;parte de la semana.\">What each part of<br>the week looks like.<\u002Fdiv>\n    <span class=\"chev\" aria-hidden=\"true\"><\u002Fspan><\u002Fdiv>\n    <div class=\"acc-panel\"><div class=\"body\" id=\"sci-p4\">\n      <dl class=\"defs\">\n        <div class=\"defrow\"><dt data-en=\"Monday – Friday\" data-es=\"Lunes – Viernes\">Monday – Friday<\u002Fdt><dd data-en=\"Class daily. Most days include investigation or lab work, recorded in the science notebook.\" data-es=\"Clase diaria. La mayoría de los días incluye investigación o trabajo de laboratorio, registrado en el cuaderno de ciencias.\">Class daily. Most days include investigation or lab work, recorded in the science notebook.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"End of Each Scope\" data-es=\"Cierre de Cada Tema\">End of Each Scope<\u002Fdt><dd data-en=\"Students write their claim–evidence–reasoning explanation and take the scope assessment.\" data-es=\"Los estudiantes escriben su explicación de afirmación–evidencia–razonamiento y toman la evaluación del tema.\">Students write their claim–evidence–reasoning explanation and take the scope assessment.<\u002Fdd><\u002Fdiv>\n      <\u002Fdl>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"sci-s5\" class=\"reveal acc\">\n    <div class=\"marg acc-head\" role=\"button\" tabindex=\"0\" aria-expanded=\"true\" aria-controls=\"sci-p5\">\n      <div class=\"romn\">V.<\u002Fdiv>\n      <h2 data-en=\"Homework &amp; Independent Practice\" data-es=\"Tarea y Práctica Independiente\">Homework &amp; Independent Practice<\u002Fh2>\n      <div class=\"note\" data-en=\"The four core&lt;br&gt;assignments.\" data-es=\"Las cuatro tareas&lt;br&gt;principales.\">The four core<br>assignments.<\u002Fdiv>\n    <span class=\"chev\" aria-hidden=\"true\"><\u002Fspan><\u002Fdiv>\n    <div class=\"acc-panel\"><div class=\"body\" id=\"sci-p5\">\n      <dl class=\"defs\">\n        <div class=\"defrow\"><dt data-en=\"STEMscopedia\" data-es=\"STEMscopedia\">STEMscopedia<\u002Fdt><dd data-en=\"Reference reading for each scope, with guided questions to anchor the key ideas.\" data-es=\"Lectura de referencia para cada tema, con preguntas guiadas para afianzar las ideas clave.\">Reference reading for each scope, with guided questions to anchor the key ideas.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"Reading Science\" data-es=\"Reading Science\">Reading Science<\u002Fdt><dd data-en=\"A nonfiction science article with comprehension and analysis questions.\" data-es=\"Un artículo científico de no ficción con preguntas de comprensión y análisis.\">A nonfiction science article with comprehension and analysis questions.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"Math Connection\" data-es=\"Math Connection\">Math Connection<\u002Fdt><dd data-en=\"Applying grade-level math — ratios, rates, graphs, and data — to the science of the scope.\" data-es=\"Aplicar las matemáticas del grado — razones, tasas, gráficas y datos — a la ciencia del tema.\">Applying grade-level math — ratios, rates, graphs, and data — to the science of the scope.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"Science Art\" data-es=\"Science Art\">Science Art<\u002Fdt><dd data-en=\"Communicating the science visually — diagrams, models, and illustrations of the phenomenon.\" data-es=\"Comunicar la ciencia visualmente — diagramas, modelos e ilustraciones del fenómeno.\">Communicating the science visually — diagrams, models, and illustrations of the phenomenon.<\u002Fdd><\u002Fdiv>\n      <\u002Fdl>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"sci-s6\" class=\"reveal acc\">\n    <div class=\"marg acc-head\" role=\"button\" tabindex=\"0\" aria-expanded=\"true\" aria-controls=\"sci-p6\">\n      <div class=\"romn\">VI.<\u002Fdiv>\n      <h2 data-en=\"Assessment\" data-es=\"Evaluación\">Assessment<\u002Fh2>\n      <div class=\"note\" data-en=\"How learning&lt;br&gt;is checked.\" data-es=\"Cómo se evalúa&lt;br&gt;el aprendizaje.\">How learning<br>is checked.<\u002Fdiv>\n    <span class=\"chev\" aria-hidden=\"true\"><\u002Fspan><\u002Fdiv>\n    <div class=\"acc-panel\"><div class=\"body\" id=\"sci-p6\">\n      <dl class=\"defs\">\n        <div class=\"defrow\"><dt data-en=\"Wayground Quizzes\" data-es=\"Pruebas en Wayground\">Wayground Quizzes<\u002Fdt><dd data-en=\"Short digital quizzes throughout each scope — practice first, then graded checks.\" data-es=\"Pruebas digitales cortas durante cada tema — primero práctica, luego revisiones calificadas.\">Short digital quizzes throughout each scope — practice first, then graded checks.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"Scope Assessment\" data-es=\"Evaluación del Tema\">Scope Assessment<\u002Fdt><dd data-en=\"One per scope, taken on Wayground at the close of the scope. Always announced in advance.\" data-es=\"Una por tema, en Wayground al cierre del tema. Siempre se anuncia con anticipación.\">One per scope, taken on Wayground at the close of the scope. Always announced in advance.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"Claim–Evidence–Reasoning\" data-es=\"Afirmación–Evidencia–Razonamiento\">Claim–Evidence–Reasoning<\u002Fdt><dd data-en=\"A written scientific explanation answering the scope's phenomenon question.\" data-es=\"Una explicación científica escrita que responde la pregunta del fenómeno del tema.\">A written scientific explanation answering the scope's phenomenon question.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"Mission Action Plan\" data-es=\"Plan de Acción de la Misión\">Mission Action Plan<\u002Fdt><dd data-en=\"The capstone of each segment — students apply everything they learned to the segment's mission.\" data-es=\"La culminación de cada segmento — los estudiantes aplican todo lo aprendido a la misión del segmento.\">The capstone of each segment — students apply everything they learned to the segment's mission.<\u002Fdd><\u002Fdiv>\n      <\u002Fdl>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"sci-s7p\" class=\"reveal acc\">\n    <div class=\"marg acc-head\" role=\"button\" tabindex=\"0\" aria-expanded=\"true\" aria-controls=\"sci-p7\">\n      <div class=\"romn\">VII.<\u002Fdiv>\n      <h2 data-en=\"Segment Missions\" data-es=\"Misiones de Segmento\">Segment Missions<\u002Fh2>\n      <div class=\"note\" data-en=\"Four missions&lt;br&gt;across the year.\" data-es=\"Cuatro misiones&lt;br&gt;durante el año.\">Four missions<br>across the year.<\u002Fdiv>\n    <span class=\"chev\" aria-hidden=\"true\"><\u002Fspan><\u002Fdiv>\n    <div class=\"acc-panel\"><div class=\"body\" id=\"sci-p7\">\n      <dl class=\"defs\">\n        <div class=\"defrow\"><dt data-en=\"Two Systems, One Model\" data-es=\"Dos Sistemas, Un Modelo\">Two Systems, One Model<\u002Fdt><dd data-en=\"Students develop a model comparing Earth's climate system with the human body system.\" data-es=\"Los estudiantes desarrollan un modelo que compara el sistema climático de la Tierra con el sistema del cuerpo humano.\">Students develop a model comparing Earth's climate system with the human body system.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"Design for the Elements\" data-es=\"Diseño para los Elementos\">Design for the Elements<\u002Fdt><dd data-en=\"As structural engineers, students design a portable, power-free structure that keeps athletes cool in hot climates and warm in cold ones.\" data-es=\"Como ingenieros estructurales, los estudiantes diseñan una estructura portátil sin electricidad que mantiene frescos a los atletas en climas cálidos y abrigados en climas fríos.\">As structural engineers, students design a portable, power-free structure that keeps athletes cool in hot climates and warm in cold ones.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"A Desert Iditarod\" data-es=\"Un Iditarod del Desierto\">A Desert Iditarod<\u002Fdt><dd data-en=\"Students plan a dogsled race in the Arabian Desert — comparing climates, breeding for traits, and predicting race-day weather.\" data-es=\"Los estudiantes planifican una carrera de trineos en el Desierto de Arabia — comparando climas, criando por rasgos y prediciendo el clima de la carrera.\">Students plan a dogsled race in the Arabian Desert — comparing climates, breeding for traits, and predicting race-day weather.<\u002Fdd><\u002Fdiv>\n        <div class=\"defrow\"><dt data-en=\"The Water Debate\" data-es=\"El Debate del Agua\">The Water Debate<\u002Fdt><dd data-en=\"Students argue why their group's water supply should not be reduced, and debate other groups face to face.\" data-es=\"Los estudiantes argumentan por qué no se debe reducir el suministro de agua de su grupo, y debaten cara a cara con otros grupos.\">Students argue why their group's water supply should not be reduced, and debate other groups face to face.<\u002Fdd><\u002Fdiv>\n
